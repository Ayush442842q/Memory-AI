<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MemoryAI — AI chat with memory</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #232323;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #7c6af7;
    --accent-dim: #3d3570;
    --user-bg: #1e1b3a;
    --ai-bg: #1a1a1a;
    --radius: 12px;
    --font: 'Inter', -apple-system, sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

  /* layout */
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* sidebar */
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .new-chat-btn { width: 100%; margin-top: 12px; padding: 9px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .new-chat-btn:hover { opacity: 0.85; }
  .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.1s; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--accent-dim); }
  .session-name { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-provider { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .session-del { opacity: 0; font-size: 14px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0 2px; }
  .session-item:hover .session-del { opacity: 1; }
  .session-del:hover { color: #e55; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  .api-key-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .api-key-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; color: var(--text); font-size: 12px; font-family: monospace; }
  .api-key-input::placeholder { color: var(--muted); }
  .api-key-input:focus { outline: none; border-color: var(--accent); }

  /* main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); }
  .chat-title { font-size: 15px; font-weight: 600; flex: 1; }
  .provider-tag { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; color: var(--muted); }
  .model-tag { font-size: 11px; background: var(--accent-dim); border-radius: 6px; padding: 3px 9px; color: #c9c0ff; }

  /* empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; }
  .empty-icon { font-size: 40px; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 14px; color: var(--muted); }

  /* messages */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 12px; max-width: 780px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-weight: 600; }
  .msg.user .avatar { background: var(--accent); color: #fff; }
  .msg.assistant .avatar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .bubble { padding: 11px 15px; border-radius: 12px; font-size: 14px; line-height: 1.65; max-width: 600px; }
  .msg.user .bubble { background: var(--user-bg); border: 1px solid var(--accent-dim); border-top-right-radius: 3px; }
  .msg.assistant .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-top-left-radius: 3px; }
  .bubble code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }
  .bubble pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .bubble pre code { background: none; padding: 0; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 12px 15px; }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* input */
  .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-row { display: flex; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; transition: border-color 0.15s; }
  .input-row:focus-within { border-color: var(--accent); }
  .msg-input { flex: 1; background: none; border: none; color: var(--text); font-size: 14px; font-family: var(--font); resize: none; outline: none; max-height: 120px; line-height: 1.5; }
  .msg-input::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; align-self: flex-end; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 420px; max-width: 95vw; }
  .modal h2 { font-size: 17px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; color: var(--text); font-size: 14px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 9px 16px; font-size: 13px; cursor: pointer; }
  .btn-create { background: var(--accent); border: none; border-radius: 8px; color: #fff; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-dot"></span>MemoryAI</div>
      <div class="logo-sub">Persistent memory across every session</div>
      <button class="new-chat-btn" onclick="openNewChat()">+ New chat</button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
    <div class="sidebar-footer">
      <div class="api-key-label">API key (stored in browser only)</div>
      <input class="api-key-input" id="apiKey" type="password" placeholder="sk-... or your key" />
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">No chat selected</div>
      <div class="empty-sub">Create a new chat to get started</div>
    </div>
  </main>
</div>

<!-- New Chat Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New chat</h2>
    <div class="field">
      <label>Chat name</label>
      <input id="newName" placeholder="My assistant" />
    </div>
    <div class="field">
      <label>Provider</label>
      <select id="newProvider" onchange="updateModels()"></select>
    </div>
    <div class="field">
      <label>Model</label>
      <select id="newModel"></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" onclick="createSession()">Create</button>
    </div>
  </div>
</div>

<script>
let providers = [];
let sessions = [];
let currentSession = null;

async function loadProviders() {
  const r = await fetch("/api/providers");
  providers = await r.json();
  const sel = document.getElementById("newProvider");
  sel.innerHTML = providers.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  updateModels();
}

function updateModels() {
  const pid = document.getElementById("newProvider").value;
  const p = providers.find(x => x.id === pid);
  const sel = document.getElementById("newModel");
  sel.innerHTML = p ? p.models.map(m => `<option value="${m}">${m}</option>`).join("") : "";
}

async function loadSessions() {
  const r = await fetch("/api/sessions");
  sessions = await r.json();
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById("sessionsList");
  if (!sessions.length) { list.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:12px 10px;">No chats yet</div>'; return; }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${currentSession?.id === s.id ? 'active' : ''}" onclick="selectSession('${s.id}')">
      <div>
        <div class="session-name">${s.name}</div>
        <div class="session-provider">${s.provider} · ${s.model}</div>
      </div>
      <button class="session-del" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="Delete">✕</button>
    </div>
  `).join("");
}

async function selectSession(id) {
  currentSession = sessions.find(s => s.id === id);
  renderSessions();
  await renderChatView();
}

async function renderChatView() {
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="topbar">
      <div class="chat-title">${currentSession.name}</div>
      <span class="provider-tag">${currentSession.provider}</span>
      <span class="model-tag">${currentSession.model}</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Message ${currentSession.name}..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  `;
  await loadMessages();
  document.getElementById("msgInput").focus();
}

async function loadMessages() {
  const r = await fetch(`/api/sessions/${currentSession.id}/messages`);
  const msgs = await r.json();
  const container = document.getElementById("messages");
  container.innerHTML = msgs.map(m => renderBubble(m.role, m.content)).join("");
  container.scrollTop = container.scrollHeight;
}

function renderBubble(role, content) {
  const avatar = role === "user" ? "U" : "AI";
  const safe = content.replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\n/g, "<br>");
  return `<div class="msg ${role}"><div class="avatar">${avatar}</div><div class="bubble">${safe}</div></div>`;
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const btn = document.getElementById("sendBtn");
  const msg = input.value.trim();
  if (!msg || !currentSession) return;

  input.value = "";
  autoResize(input);
  btn.disabled = true;

  const container = document.getElementById("messages");
  container.insertAdjacentHTML("beforeend", renderBubble("user", msg));
  const thinking = document.createElement("div");
  thinking.className = "msg assistant";
  thinking.innerHTML = `<div class="avatar">AI</div><div class="bubble thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  container.appendChild(thinking);
  container.scrollTop = container.scrollHeight;

  try {
    const r = await fetch(`/api/sessions/${currentSession.id}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, api_key: document.getElementById("apiKey").value })
    });
    const data = await r.json();
    thinking.remove();
    if (data.error) {
      container.insertAdjacentHTML("beforeend", renderBubble("assistant", `⚠️ Error: ${data.error}`));
    } else {
      container.insertAdjacentHTML("beforeend", renderBubble("assistant", data.reply));
    }
  } catch(e) {
    thinking.remove();
    container.insertAdjacentHTML("beforeend", renderBubble("assistant", "⚠️ Network error. Is the server running?"));
  }

  btn.disabled = false;
  container.scrollTop = container.scrollHeight;
}

function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 120) + "px"; }

function openNewChat() { document.getElementById("modal").classList.add("open"); document.getElementById("newName").focus(); }
function closeModal() { document.getElementById("modal").classList.remove("open"); }

async function createSession() {
  const name = document.getElementById("newName").value.trim() || "New chat";
  const provider = document.getElementById("newProvider").value;
  const model = document.getElementById("newModel").value;
  const r = await fetch("/api/sessions", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({name, provider, model}) });
  const s = await r.json();
  sessions.unshift(s);
  closeModal();
  document.getElementById("newName").value = "";
  await selectSession(s.id);
  renderSessions();
}

async function deleteSession(id) {
  if (!confirm("Delete this chat and all its messages?")) return;
  await fetch(`/api/sessions/${id}`, { method: "DELETE" });
  sessions = sessions.filter(s => s.id !== id);
  if (currentSession?.id === id) {
    currentSession = null;
    document.getElementById("main").innerHTML = `<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div class="empty-title">No chat selected</div><div class="empty-sub">Create a new chat to get started</div></div>`;
  }
  renderSessions();
}

document.getElementById("modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });

(async () => { await loadProviders(); await loadSessions(); })();
</script>
</body>
</html>
